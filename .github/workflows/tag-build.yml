name: Tag Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: yarn build

      - name: Copy frontend dist
        run: |
          if (Test-Path dist) { Remove-Item -Recurse -Force dist }
          New-Item -ItemType Directory -Path dist | Out-Null
          Copy-Item -Recurse frontend/dist/spa/* dist/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build Go app
        run: go build -o search-gin.exe -ldflags "-H=windowsgui" -tags=prod

      - name: Package release
        run: |
          $tag = "${{ github.ref_name }}"
          Compress-Archive -Path search-gin.exe, ffmpeg.exe, ffplay.exe -DestinationPath "search-gin-$tag.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: search-gin-*.zip
          generate_release_notes: true
