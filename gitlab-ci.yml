# .gitlab-ci.yml

stages:
  - build

# 定义变量
variables:
  APP_NAME: "search-gin"

# 任务：构建与打包
build-release:
  stage: build
  # 使用包含 Node 和 Go 的镜像，或者你可以分开使用 Docker in Docker
  # 这里为了演示，假设使用一个基础镜像并手动安装，或者使用包含所需环境的自定义镜像
  image: golang:1.25 # 假设基础镜像是 Go，你需要自己在脚本里装 Node 或者换一个包含两者的镜像
  # 更好的方式是使用一个包含了 nodejs 和 golang 的自定义镜像，或者在 before_script 安装

  before_script:
    - apt-get update && apt-get install -y nodejs npm zip # 安装必要的工具
    - cd repo_workspace/frontend
    - npm ci

  script:
    # 1. 构建前端
    - echo "Building Frontend..."
    - cd repo_workspace/frontend
    - npm run build
    - cd ..
    - rm -rf dist
    - mkdir -p dist
    - cp -r frontend/dist/spa/* dist/

    # 2. 构建 Go 后端
    - echo "Building Go App..."
    - CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o ${APP_NAME}.exe -ldflags "-H=windowsgui" .

    # 3. 打包 Release
    - echo "Packaging..."
    # 获取 Tag 名称
    - TAG_NAME=${CI_COMMIT_TAG#v}
    - zip ${APP_NAME}-${TAG_NAME}.zip ${APP_NAME}.exe ffmpeg.exe ffplay.exe -j
    # 注意：如果 ffmpeg.exe 不在当前目录，需要指定正确路径

  # 只有在打 Tag 时才运行 (例如 v0.1.1)
  rules:
    - if: $CI_COMMIT_TAG =~ /^v.*$/

  # 产物保留，方便下载 (GitCode/GitLab 会在流水线页面提供下载)
  artifacts:
    paths:
      - "*.zip"
