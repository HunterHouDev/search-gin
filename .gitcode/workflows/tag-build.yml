name: tag-build
on:
  push:
    tags:
      - 'v*'
jobs:
  build:
    runs-on: euleros-2.10.1
    steps:
      - uses: checkout-action@0.0.1
      - name: Setup Node.js
        uses: setup-node@0.0.1
        with:
          node-version: '20.10.0'
      - name: Install frontend dependencies
        run: cd repo_workspace/frontend && npm ci
      - name: Build frontend
        run: cd repo_workspace/frontend && npm run build
      - name: Copy frontend dist
        run: |
          cd repo_workspace
          rm -rf dist
          mkdir dist
          cp -r frontend/dist/spa/* dist/
      - name: Setup Go
        uses: setup-go@0.0.1
        with:
          go-version: '1.25'
      - name: Build Go app
        run: |
          cd repo_workspace
          GOOS=windows GOARCH=amd64 go build -o search-gin.exe -ldflags "-H=windowsgui" -tags=prod
      - name: Package release
        run: |
          cd repo_workspace
          TAG=$(echo ${{git.tag}} | sed 's/refs\/tags\///')
          zip search-gin-$TAG.zip search-gin.exe ffmpeg.exe ffplay.exe
